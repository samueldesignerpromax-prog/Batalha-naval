<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚓ Guerra Naval - Battleship ⚓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a1628, #0a2a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .game-wrapper {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #2a6f8f;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        .info-panel {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid #2a6f8f;
        }

        .stat {
            text-align: center;
            color: white;
        }

        .stat-label {
            font-size: 11px;
            color: #6aa9bb;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc44;
        }

        .health-bar {
            width: 120px;
            height: 8px;
            background: #660000;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #44ff44, #ffcc44);
            transition: width 0.2s;
        }

        button {
            background: linear-gradient(135deg, #2a6f8f, #1a4a6f);
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            font-family: monospace;
        }

        button:hover {
            transform: scale(1.02);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
        }

        .controls span {
            color: #ffcc44;
            font-weight: bold;
            font-size: 12px;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            border: 2px solid #ffcc44;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="550"></canvas>
        
        <div class="info-panel">
            <div class="stat">
                <div class="stat-label">🚢 SEU NAVIO</div>
                <div class="health-bar">
                    <div class="health-fill" id="playerHealth" style="width: 100%"></div>
                </div>
                <div class="stat-value" id="playerHp">100%</div>
            </div>
            <div class="stat">
                <div class="stat-label">💥 DANO</div>
                <div class="stat-value" id="damage">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">🎯 ACERTOS</div>
                <div class="stat-value" id="hits">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">🚢 INIMIGOS</div>
                <div class="stat-value" id="enemiesLeft">5</div>
            </div>
            <button onclick="resetGame()">🔄 REINICIAR</button>
        </div>

        <div class="controls">
            <span>⬆️ W/↑</span>
            <span>⬇️ S/↓</span>
            <span>⬅️ A/←</span>
            <span>➡️ D/→</span>
            <span>🔫 ESPAÇO</span>
            <span>🖱️ CLIQUE</span>
        </div>
    </div>

    <div id="gameOver" class="game-over hidden">
        <h1 id="gameOverTitle" style="color:#44ff44">🏆 VITÓRIA! 🏆</h1>
        <p id="gameOverText" style="color:white; margin:15px 0"></p>
        <button onclick="resetGame()">⚓ JOGAR NOVAMENTE ⚓</button>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÕES
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Tamanho do canvas
        canvas.width = 800;
        canvas.height = 550;
        
        // ============================================
        // TECLAS
        // ============================================
        const keys = {
            up: false, down: false, left: false, right: false
        };
        
        // ============================================
        // VARIÁVEIS DO JOGO
        // ============================================
        let player = {
            x: 400,
            y: 480,
            hp: 100,
            maxHp: 100,
            size: 25,
            shootCooldown: 0
        };
        
        let enemies = [];
        let bullets = [];
        let explosions = [];
        let score = 0;
        let hits = 0;
        let gameRunning = true;
        let mouseX = 400, mouseY = 480;
        
        // ============================================
        // INIMIGOS INICIAIS
        // ============================================
        function initEnemies() {
            enemies = [
                { x: 100, y: 80, hp: 60, maxHp: 60, size: 28, damage: 12, type: 'couracado', shootCooldown: 0 },
                { x: 300, y: 60, hp: 50, maxHp: 50, size: 25, damage: 10, type: 'cruzador', shootCooldown: 0 },
                { x: 500, y: 90, hp: 50, maxHp: 50, size: 25, damage: 10, type: 'cruzador', shootCooldown: 0 },
                { x: 700, y: 70, hp: 40, maxHp: 40, size: 22, damage: 8, type: 'destroyer', shootCooldown: 0 },
                { x: 200, y: 150, hp: 40, maxHp: 40, size: 22, damage: 8, type: 'destroyer', shootCooldown: 0 }
            ];
        }
        
        // ============================================
        // RESETAR JOGO
        // ============================================
        function resetGame() {
            player = {
                x: 400,
                y: 480,
                hp: 100,
                maxHp: 100,
                size: 25,
                shootCooldown: 0
            };
            
            initEnemies();
            bullets = [];
            explosions = [];
            score = 0;
            hits = 0;
            gameRunning = true;
            
            document.getElementById('gameOver').classList.add('hidden');
            updateUI();
        }
        
        // ============================================
        // ATUALIZAR INTERFACE
        // ============================================
        function updateUI() {
            const hpPercent = (player.hp / player.maxHp) * 100;
            document.getElementById('playerHealth').style.width = hpPercent + '%';
            document.getElementById('playerHp').innerText = Math.floor(hpPercent) + '%';
            document.getElementById('damage').innerText = score;
            document.getElementById('hits').innerText = hits;
            document.getElementById('enemiesLeft').innerText = enemies.filter(e => e.hp > 0).length;
        }
        
        // ============================================
        // ATIRAR
        // ============================================
        function shoot() {
            if (!gameRunning) return;
            if (player.shootCooldown > 0) return;
            
            // Calcular ângulo para o mouse
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            
            bullets.push({
                x: player.x + Math.cos(angle) * 25,
                y: player.y + Math.sin(angle) * 25,
                vx: Math.cos(angle) * 450,
                vy: Math.sin(angle) * 450,
                damage: 15,
                isPlayer: true,
                life: true
            });
            
            player.shootCooldown = 0.5;
        }
        
        // ============================================
        // ATUALIZAR JOGO
        // ============================================
        function updateGame(deltaTime) {
            if (!gameRunning) return;
            
            // ========== MOVIMENTO DO JOGADOR ==========
            let moveX = 0, moveY = 0;
            if (keys.up) moveY -= 1;
            if (keys.down) moveY += 1;
            if (keys.left) moveX -= 1;
            if (keys.right) moveX += 1;
            
            if (moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX /= len;
                moveY /= len;
            }
            
            player.x += moveX * 250 * deltaTime;
            player.y += moveY * 250 * deltaTime;
            
            // Limites
            player.x = Math.min(Math.max(player.x, 35), canvas.width - 35);
            player.y = Math.min(Math.max(player.y, 50), canvas.height - 40);
            
            // Cooldown do tiro
            if (player.shootCooldown > 0) {
                player.shootCooldown -= deltaTime;
            }
            
            // ========== INIMIGOS ==========
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (e.hp <= 0) continue;
                
                // Inimigos atiram
                if (e.shootCooldown > 0) {
                    e.shootCooldown -= deltaTime;
                } else {
                    const angle = Math.atan2(player.y - e.y, player.x - e.x);
                    bullets.push({
                        x: e.x + Math.cos(angle) * 25,
                        y: e.y + Math.sin(angle) * 25,
                        vx: Math.cos(angle) * 350,
                        vy: Math.sin(angle) * 350,
                        damage: e.damage,
                        isPlayer: false,
                        life: true
                    });
                    e.shootCooldown = 1.0;
                }
            }
            
            // ========== BALAS ==========
            for (let i = 0; i < bullets.length; i++) {
                const b = bullets[i];
                b.x += b.vx * deltaTime;
                b.y += b.vy * deltaTime;
                
                // Fora da tela
                if (b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) {
                    bullets.splice(i, 1);
                    i--;
                    continue;
                }
                
                let hit = false;
                
                if (b.isPlayer) {
                    // Bala do jogador acerta inimigos
                    for (let j = 0; j < enemies.length; j++) {
                        const e = enemies[j];
                        if (e.hp <= 0) continue;
                        
                        const dx = b.x - e.x;
                        const dy = b.y - e.y;
                        const dist = Math.hypot(dx, dy);
                        
                        if (dist < e.size + 5) {
                            e.hp -= b.damage;
                            hit = true;
                            score += b.damage;
                            hits++;
                            
                            explosions.push({ x: b.x, y: b.y, life: 0.4 });
                            updateUI();
                            
                            if (e.hp <= 0) {
                                explosions.push({ x: e.x, y: e.y, life: 0.6 });
                            }
                            break;
                        }
                    }
                } else {
                    // Bala inimiga acerta jogador
                    const dx = b.x - player.x;
                    const dy = b.y - player.y;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist < player.size + 5) {
                        player.hp -= b.damage;
                        hit = true;
                        explosions.push({ x: b.x, y: b.y, life: 0.4 });
                        updateUI();
                        
                        if (player.hp <= 0) {
                            gameRunning = false;
                            document.getElementById('gameOverTitle').innerHTML = '💀 DERROTA! 💀';
                            document.getElementById('gameOverTitle').style.color = '#ff4444';
                            document.getElementById('gameOverText').innerHTML = `Você causou ${score} de dano antes de afundar!`;
                            document.getElementById('gameOver').classList.remove('hidden');
                        }
                    }
                }
                
                if (hit) {
                    bullets.splice(i, 1);
                    i--;
                }
            }
            
            // ========== EXPLOSÕES ==========
            for (let i = 0; i < explosions.length; i++) {
                explosions[i].life -= deltaTime;
                if (explosions[i].life <= 0) {
                    explosions.splice(i, 1);
                    i--;
                }
            }
            
            // ========== VERIFICAR VITÓRIA ==========
            const enemiesAlive = enemies.filter(e => e.hp > 0).length;
            if (enemiesAlive === 0 && gameRunning) {
                gameRunning = false;
                document.getElementById('gameOverTitle').innerHTML = '🏆 VITÓRIA! 🏆';
                document.getElementById('gameOverTitle').style.color = '#44ff44';
                document.getElementById('gameOverText').innerHTML = `Dano causado: ${score} | Acertos: ${hits}`;
                document.getElementById('gameOver').classList.remove('hidden');
            }
        }
        
        // ============================================
        // DESENHAR
        // ============================================
        function draw() {
            // Mar
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#0a3a5a');
            grad.addColorStop(1, '#0a2a4a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ondas
            ctx.strokeStyle = 'rgba(100, 180, 255, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                const y = i * 60 + (Date.now() * 0.02) % 60;
                for (let x = 0; x < canvas.width; x += 40) {
                    const waveY = y + Math.sin(x * 0.02 + Date.now() * 0.005) * 3;
                    if (x === 0) ctx.moveTo(x, waveY);
                    else ctx.lineTo(x, waveY);
                }
                ctx.stroke();
            }
            
            // Desenhar inimigos
            for (const e of enemies) {
                if (e.hp <= 0) continue;
                
                ctx.save();
                ctx.translate(e.x, e.y);
                
                // Casco
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.ellipse(0, 0, e.size, e.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Deck
                ctx.fillStyle = '#A0522D';
                ctx.beginPath();
                ctx.ellipse(0, -5, e.size * 0.7, e.size * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Canhão
                ctx.fillStyle = '#666';
                ctx.fillRect(e.size * 0.4, -4, 12, 6);
                
                // Mastro
                ctx.fillStyle = '#8B6914';
                ctx.fillRect(-3, -e.size * 0.7, 5, e.size * 0.7);
                
                // Vela
                ctx.fillStyle = '#F5F5DC';
                ctx.beginPath();
                ctx.moveTo(0, -e.size * 0.7);
                ctx.lineTo(-10, -e.size * 0.2);
                ctx.lineTo(10, -e.size * 0.2);
                ctx.fill();
                
                // Barra de vida
                const hpPercent = e.hp / e.maxHp;
                ctx.fillStyle = '#660000';
                ctx.fillRect(-e.size * 0.6, -e.size * 0.8, e.size * 1.2, 5);
                ctx.fillStyle = '#44ff44';
                ctx.fillRect(-e.size * 0.6, -e.size * 0.8, e.size * 1.2 * hpPercent, 5);
                
                ctx.restore();
            }
            
            // Desenhar balas
            for (const b of bullets) {
                ctx.fillStyle = '#FFAA44';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            
            // Desenhar explosões
            for (const exp of explosions) {
                const alpha = exp.life * 2;
                ctx.fillStyle = `rgba(255, 100, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, 18 * (1 - exp.life), 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = `rgba(255, 200, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, 10 * (1 - exp.life), 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Desenhar jogador
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Casco
            ctx.fillStyle = '#2E8B57';
            ctx.beginPath();
            ctx.ellipse(0, 0, player.size, player.size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Deck
            ctx.fillStyle = '#3CB371';
            ctx.beginPath();
            ctx.ellipse(0, -5, player.size * 0.7, player.size * 0.35, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Canhão (aponta para o mouse)
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            ctx.fillStyle = '#666';
            ctx.fillRect(player.size * 0.4, -4, 14, 7);
            ctx.fillStyle = '#888';
            ctx.fillRect(player.size * 0.5 + 6, -3, 15, 5);
            
            // Mastro
            ctx.fillStyle = '#8B6914';
            ctx.fillRect(-3, -player.size * 0.7, 5, player.size * 0.7);
            
            // Vela
            ctx.fillStyle = '#F5F5DC';
            ctx.beginPath();
            ctx.moveTo(0, -player.size * 0.7);
            ctx.lineTo(-10, -player.size * 0.2);
            ctx.lineTo(10, -player.size * 0.2);
            ctx.fill();
            
            // Bandeira
            ctx.fillStyle = '#44FF44';
            ctx.fillRect(0, -player.size * 0.75, 14, 6);
            
            ctx.restore();
            
            // Barra de vida do jogador
            const hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = '#660000';
            ctx.fillRect(player.x - 22, player.y - 28, 44, 5);
            ctx.fillStyle = '#44ff44';
            ctx.fillRect(player.x - 22, player.y - 28, 44 * hpPercent, 5);
            
            // Linha de mira
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(mouseX, mouseY);
            ctx.strokeStyle = 'rgba(255, 200, 68, 0.5)';
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Mira do mouse
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 10, 0, Math.PI * 2);
            ctx.strokeStyle = '#FFCC44';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(mouseX - 16, mouseY);
            ctx.lineTo(mouseX - 6, mouseY);
            ctx.moveTo(mouseX + 6, mouseY);
            ctx.lineTo(mouseX + 16, mouseY);
            ctx.moveTo(mouseX, mouseY - 16);
            ctx.lineTo(mouseX, mouseY - 6);
            ctx.moveTo(mouseX, mouseY + 6);
            ctx.lineTo(mouseX, mouseY + 16);
            ctx.stroke();
        }
        
        // ============================================
        // EVENTOS DO TECLADO
        // ============================================
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'w' || key === 'W') keys.up = true;
            if (key === 'ArrowDown' || key === 's' || key === 'S') keys.down = true;
            if (key === 'ArrowLeft' || key === 'a' || key === 'A') keys.left = true;
            if (key === 'ArrowRight' || key === 'd' || key === 'D') keys.right = true;
            if (key === ' ') {
                e.preventDefault();
                shoot();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'w' || key === 'W') keys.up = false;
            if (key === 'ArrowDown' || key === 's' || key === 'S') keys.down = false;
            if (key === 'ArrowLeft' || key === 'a' || key === 'A') keys.left = false;
            if (key === 'ArrowRight' || key === 'd' || key === 'D') keys.right = false;
        });
        
        // ============================================
        // EVENTOS DO MOUSE
        // ============================================
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            mouseX = Math.min(Math.max(mouseX, 10), canvas.width - 10);
            mouseY = Math.min(Math.max(mouseY, 10), canvas.height - 10);
        });
        
        canvas.addEventListener('click', () => {
            shoot();
        });
        
        // ============================================
        // LOOP DO JOGO
        // ============================================
        let lastTime = 0;
        
        function gameLoop(currentTime) {
            let deltaTime = (currentTime - lastTime) / 1000;
            if (deltaTime > 0.05) deltaTime = 0.033;
            lastTime = currentTime;
            
            if (deltaTime > 0) {
                updateGame(deltaTime);
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Iniciar jogo
        initEnemies();
        lastTime = performance.now();
        gameLoop(lastTime);
    </script>
</body>
</html>
